name: Slack Notification (Reusable)

on:
  workflow_call:
    inputs:
      event_type:
        description: 'Type of event: push, pr_update, workflow_success, workflow_failure'
        required: true
        type: string
      repository:
        description: 'Repository name'
        required: true
        type: string
      branch:
        description: 'Branch name'
        required: true
        type: string
      actor:
        description: 'User who triggered the event'
        required: true
        type: string
      commit_message:
        description: 'Commit message (for push events)'
        required: false
        type: string
        default: ''
      commit_url:
        description: 'URL to the commit (for push events)'
        required: false
        type: string
        default: ''
      workflow_name:
        description: 'Workflow name (for workflow_run events)'
        required: false
        type: string
        default: ''
      workflow_url:
        description: 'URL to the workflow run'
        required: false
        type: string
        default: ''
      pr_number:
        description: 'Pull request number (for pr_update events)'
        required: false
        type: string
        default: ''
      pr_title:
        description: 'Pull request title (for pr_update events)'
        required: false
        type: string
        default: ''
      pr_url:
        description: 'Pull request URL (for pr_update events)'
        required: false
        type: string
        default: ''
      base_branch:
        description: 'Base branch for PR (for pr_update events)'
        required: false
        type: string
        default: ''
    secrets:
      SLACK_WEBHOOK_URL:
        description: 'Slack webhook URL for the target channel'
        required: true

jobs:
  notify-push:
    if: inputs.event_type == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Build Slack payload file
        env:
          REPOSITORY: ${{ inputs.repository }}
          BRANCH: ${{ inputs.branch }}
          ACTOR: ${{ inputs.actor }}
          COMMIT_MESSAGE: ${{ inputs.commit_message }}
          COMMIT_URL: ${{ inputs.commit_url }}
        run: |
          python3 - <<'EOF'
          import json, os
          header_text = (
            f":bell: *Push to {os.environ['REPOSITORY']}*\n"
            f"*Branch:* `{os.environ['BRANCH']}`\n"
            f"*By:* {os.environ['ACTOR']}"
          )
          commit_msg = os.environ['COMMIT_MESSAGE']
          payload = {
            "blocks": [
              {
                "type": "section",
                "text": {"type": "mrkdwn", "text": header_text}
              },
              {
                "type": "context",
                "elements": [
                  {"type": "mrkdwn", "text": commit_msg}
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {"type": "plain_text", "text": "View Commit"},
                    "url": os.environ['COMMIT_URL']
                  }
                ]
              }
            ]
          }
          with open('/tmp/slack_payload.json', 'w') as f:
            json.dump(payload, f)
          EOF

      - name: Notify Slack on Push
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack_payload.json

  notify-pr-update:
    if: inputs.event_type == 'pr_update'
    runs-on: ubuntu-latest
    steps:
      - name: Build Slack payload file
        env:
          PR_TITLE: ${{ inputs.pr_title }}
          PR_NUMBER: ${{ inputs.pr_number }}
          BRANCH: ${{ inputs.branch }}
          BASE_BRANCH: ${{ inputs.base_branch }}
          REPOSITORY: ${{ inputs.repository }}
          ACTOR: ${{ inputs.actor }}
          PR_URL: ${{ inputs.pr_url }}
        run: |
          python3 - <<'EOF'
          import json, os
          text = (
            f":arrows_counterclockwise: *New commits pushed to PR #{os.environ['PR_NUMBER']}*\n"
            f"*PR:* {os.environ['PR_TITLE']}\n"
            f"*Branch:* `{os.environ['BRANCH']}` → `{os.environ['BASE_BRANCH']}`\n"
            f"*Repo:* {os.environ['REPOSITORY']}\n"
            f"*By:* {os.environ['ACTOR']}"
          )
          payload = {
            "blocks": [
              {
                "type": "section",
                "text": {"type": "mrkdwn", "text": text}
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {"type": "plain_text", "text": "View PR"},
                    "url": os.environ['PR_URL']
                  }
                ]
              }
            ]
          }
          with open('/tmp/slack_payload.json', 'w') as f:
            json.dump(payload, f)
          EOF

      - name: Notify Slack on PR Update
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack_payload.json

  notify-workflow-success:
    if: inputs.event_type == 'workflow_success'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on Workflow Success
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: *Workflow Succeeded*\n*Workflow:* ${{ inputs.workflow_name }}\n*Branch:* `${{ inputs.branch }}`\n*Repo:* ${{ inputs.repository }}\n*Triggered by:* ${{ inputs.actor }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "${{ inputs.workflow_url }}"
                    }
                  ]
                }
              ]
            }

  notify-workflow-failure:
    if: inputs.event_type == 'workflow_failure'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on Workflow Failure
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Workflow Failed*\n*Workflow:* ${{ inputs.workflow_name }}\n*Branch:* `${{ inputs.branch }}`\n*Repo:* ${{ inputs.repository }}\n*Triggered by:* ${{ inputs.actor }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "${{ inputs.workflow_url }}"
                    }
                  ]
                }
              ]
            }
