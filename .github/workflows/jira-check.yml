name: Jira Ticket Check (Reusable)

on:
  workflow_call:
    inputs:
      branch:
        description: 'Head branch name of the PR'
        required: true
        type: string
      jira_base_url:
        description: 'Jira base URL, e.g. https://yourcompany.atlassian.net'
        required: true
        type: string
      project_key:
        description: 'Jira project key to require, e.g. DSB. Only branches like feat/DSB-475-card-name will match.'
        required: true
        type: string
      bypass_label:
        description: 'PR label that skips the check entirely'
        required: false
        type: string
        default: 'no-jira-needed'
      pr_labels:
        description: 'JSON array of the PR''s current label names'
        required: false
        type: string
        default: '[]'
      disallowed_statuses:
        description: 'Comma-separated Jira statuses that fail the check (ticket already closed out)'
        required: false
        type: string
        default: 'Done(Prod),To Do'
    secrets:
      JIRA_EMAIL:
        description: 'Email of the Jira service account'
        required: true
      JIRA_API_TOKEN:
        description: 'Jira API token for the service account'
        required: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Skip if bypass label present
        id: bypass
        env:
          PR_LABELS: ${{ inputs.pr_labels }}
          BYPASS_LABEL: ${{ inputs.bypass_label }}
        run: |
          python3 - <<'EOF'
          import json, os

          labels = json.loads(os.environ["PR_LABELS"])
          bypass = os.environ["BYPASS_LABEL"]
          skip = bypass in labels

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"skip={'true' if skip else 'false'}\n")

          if skip:
              print(f"Bypass label '{bypass}' present — skipping Jira check.")
          EOF

      - name: Extract Jira key from branch name
        if: steps.bypass.outputs.skip != 'true'
        id: extract
        env:
          BRANCH: ${{ inputs.branch }}
          PROJECT_KEY: ${{ inputs.project_key }}
        run: |
          python3 - <<'EOF'
          import os, re, sys

          branch = os.environ["BRANCH"]
          project_key = os.environ["PROJECT_KEY"].strip().upper()
          pattern = rf'\b{re.escape(project_key)}-\d+\b'
          match = re.search(pattern, branch, re.IGNORECASE)

          if not match:
              print(f"::error::No {project_key} issue key found in branch name '{branch}'. "
                    f"Expected a pattern like {project_key}-475 "
                    f"(e.g. feat/{project_key}-475-card-name). "
                    f"If this PR genuinely doesn't need a ticket, add the "
                    f"'no-jira-needed' label and re-run.")
              sys.exit(1)

          key = match.group(0).upper()
          print(f"Found Jira key: {key}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"key={key}\n")
          EOF

      - name: Verify ticket in Jira
        if: steps.bypass.outputs.skip != 'true'
        env:
          JIRA_BASE_URL: ${{ inputs.jira_base_url }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEY: ${{ steps.extract.outputs.key }}
          DISALLOWED_STATUSES: ${{ inputs.disallowed_statuses }}
        run: |
          python3 - <<'EOF'
          import base64, json, os, sys, urllib.request, urllib.error

          base_url = os.environ["JIRA_BASE_URL"].rstrip("/")
          email = os.environ["JIRA_EMAIL"]
          token = os.environ["JIRA_API_TOKEN"]
          issue_key = os.environ["ISSUE_KEY"]
          disallowed = {s.strip().lower() for s in os.environ["DISALLOWED_STATUSES"].split(",") if s.strip()}

          auth = base64.b64encode(f"{email}:{token}".encode()).decode()
          url = f"{base_url}/rest/api/3/issue/{issue_key}?fields=status,summary"
          req = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Basic {auth}",
                  "Accept": "application/json",
              },
          )

          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  data = json.load(resp)
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  print(f"::error::Jira issue '{issue_key}' does not exist (404). "
                        f"Check for a typo in the branch name.")
              elif e.code in (401, 403):
                  print(f"::error::Jira API auth failed ({e.code}). "
                        f"Check the JIRA_EMAIL / JIRA_API_TOKEN secrets.")
              else:
                  print(f"::error::Jira API returned HTTP {e.code} for '{issue_key}'.")
              sys.exit(1)
          except urllib.error.URLError as e:
              print(f"::error::Could not reach Jira at {base_url}: {e}")
              sys.exit(1)

          status = data["fields"]["status"]["name"]
          summary = data["fields"].get("summary", "")
          print(f"{issue_key}: '{summary}' — status: {status}")

          if status.lower() in disallowed:
              print(f"::error::Jira issue '{issue_key}' is in status '{status}', "
                    f"which isn't allowed for this PR (disallowed: {', '.join(sorted(disallowed))}). "
                    f"Update the ticket's status, or link a different one, before merging.")
              sys.exit(1)

          print(f"✓ {issue_key} is valid and open ({status}).")
          EOF
