name: Jira Ticket Check (Reusable)

on:
  workflow_call:
    inputs:
      pr_title:
        description: 'PR title. Must contain the Jira issue key, e.g. "DSB-489: promote dev to prod".'
        required: true
        type: string
      jira_base_url:
        description: 'Jira base URL, e.g. https://yourcompany.atlassian.net'
        required: true
        type: string
      project_key:
        description: 'Jira project key to require, e.g. DSB. Only branches like feat/DSB-475-card-name will match.'
        required: true
        type: string
      bypass_label:
        description: 'PR label that skips the check entirely'
        required: false
        type: string
        default: 'no-jira-needed'
      pr_labels:
        description: 'JSON array of the PR''s current label names'
        required: false
        type: string
        default: '[]'
      required_status:
        description: 'Jira status the ticket must be in for the PR to be allowed to merge (e.g. "Dev Done")'
        required: true
        type: string
      authorized_verifiers:
        description: 'Comma-separated Jira account emails allowed to have performed the transition into required_status. Leave empty to skip this check.'
        required: false
        type: string
        default: ''
      merged:
        description: 'Whether this run is for a merged PR (true) or an open/sync PR being checked (false)'
        required: false
        type: boolean
        default: false
      transition_to:
        description: 'Jira status to transition the ticket to once the PR is merged (e.g. "Done(Prod)"). No-op if empty.'
        required: false
        type: string
        default: ''
    secrets:
      JIRA_EMAIL:
        description: 'Email of the Jira service account'
        required: true
      JIRA_API_TOKEN:
        description: 'Jira API token for the service account'
        required: true

jobs:
  check:
    if: inputs.merged != true
    runs-on: ubuntu-latest
    steps:
      - name: Skip if bypass label present
        id: bypass
        env:
          PR_LABELS: ${{ inputs.pr_labels }}
          BYPASS_LABEL: ${{ inputs.bypass_label }}
        run: |
          python3 - <<'EOF'
          import json, os

          labels = json.loads(os.environ["PR_LABELS"])
          bypass = os.environ["BYPASS_LABEL"]
          skip = bypass in labels

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"skip={'true' if skip else 'false'}\n")

          if skip:
              print(f"Bypass label '{bypass}' present — skipping Jira check.")
          EOF

      - name: Extract Jira key from PR title
        if: steps.bypass.outputs.skip != 'true'
        id: extract
        env:
          PR_TITLE: ${{ inputs.pr_title }}
          PROJECT_KEY: ${{ inputs.project_key }}
        run: |
          python3 - <<'EOF'
          import os, re, sys

          pr_title = os.environ["PR_TITLE"]
          project_key = os.environ["PROJECT_KEY"].strip().upper()
          pattern = rf'\b{re.escape(project_key)}-\d+\b'

          match = re.search(pattern, pr_title, re.IGNORECASE)

          if not match:
              print(f"::error::No {project_key} issue key found in the PR title ('{pr_title}'). "
                    f"Expected a pattern like {project_key}-475 somewhere in the title "
                    f"(e.g. '{project_key}-475: promote to prod'). "
                    f"If this PR genuinely doesn't need a ticket, add the "
                    f"'no-jira-needed' label and re-run.")
              sys.exit(1)

          key = match.group(0).upper()
          print(f"Found Jira key: {key}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"key={key}\n")
          EOF

      - name: Verify ticket status in Jira
        if: steps.bypass.outputs.skip != 'true'
        env:
          JIRA_BASE_URL: ${{ inputs.jira_base_url }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEY: ${{ steps.extract.outputs.key }}
          REQUIRED_STATUS: ${{ inputs.required_status }}
          AUTHORIZED_VERIFIERS: ${{ inputs.authorized_verifiers }}
        run: |
          python3 - <<'EOF'
          import base64, json, os, sys, urllib.request, urllib.error

          base_url = os.environ["JIRA_BASE_URL"].rstrip("/")
          email = os.environ["JIRA_EMAIL"]
          token = os.environ["JIRA_API_TOKEN"]
          issue_key = os.environ["ISSUE_KEY"]
          required_status = os.environ["REQUIRED_STATUS"].strip()
          verifiers = {v.strip().lower() for v in os.environ["AUTHORIZED_VERIFIERS"].split(",") if v.strip()}

          auth = base64.b64encode(f"{email}:{token}".encode()).decode()
          headers = {"Authorization": f"Basic {auth}", "Accept": "application/json"}

          url = f"{base_url}/rest/api/3/issue/{issue_key}?fields=status,summary"
          req = urllib.request.Request(url, headers=headers)

          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  data = json.load(resp)
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  print(f"::error::Jira issue '{issue_key}' does not exist (404). "
                        f"Check for a typo in the PR title.")
              elif e.code in (401, 403):
                  print(f"::error::Jira API auth failed ({e.code}). "
                        f"Check the JIRA_EMAIL / JIRA_API_TOKEN secrets.")
              else:
                  print(f"::error::Jira API returned HTTP {e.code} for '{issue_key}'.")
              sys.exit(1)
          except urllib.error.URLError as e:
              print(f"::error::Could not reach Jira at {base_url}: {e}")
              sys.exit(1)

          status = data["fields"]["status"]["name"]
          summary = data["fields"].get("summary", "")
          print(f"{issue_key}: '{summary}' — status: {status}")

          if status.strip().lower() != required_status.lower():
              print(f"::error::Jira issue '{issue_key}' is in status '{status}', "
                    f"but this PR requires it to be in '{required_status}'. "
                    f"Move the card to '{required_status}' before merging.")
              sys.exit(1)

          print(f"✓ {issue_key} is in the required status ({status}).")

          if not verifiers:
              sys.exit(0)

          # Walk the changelog to find who most recently moved the ticket into required_status
          changelog_url = f"{base_url}/rest/api/3/issue/{issue_key}/changelog?maxResults=100"
          req = urllib.request.Request(changelog_url, headers=headers)
          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  changelog = json.load(resp)
          except (urllib.error.HTTPError, urllib.error.URLError) as e:
              print(f"::error::Could not fetch changelog for '{issue_key}': {e}. "
                    f"Cannot verify who moved this ticket to '{required_status}'.")
              sys.exit(1)

          histories = sorted(changelog.get("values", []), key=lambda h: h["created"], reverse=True)

          mover_email = None
          for entry in histories:
              for item in entry.get("items", []):
                  if item.get("field") == "status" and item.get("toString", "").strip().lower() == required_status.lower():
                      mover_email = (entry.get("author") or {}).get("emailAddress")
                      break
              if mover_email is not None:
                  break

          if mover_email is None:
              print(f"::error::Could not find who moved '{issue_key}' to '{required_status}' in its changelog. "
                    f"Cannot verify authorization.")
              sys.exit(1)

          if mover_email.strip().lower() not in verifiers:
              print(f"::error::'{issue_key}' was moved to '{required_status}' by {mover_email}, "
                    f"but only {', '.join(sorted(verifiers))} are authorized to make that change. "
                    f"Ask an authorized verifier to confirm and re-move the card.")
              sys.exit(1)

          print(f"✓ '{required_status}' was set by an authorized verifier ({mover_email}).")
          EOF

  transition:
    if: inputs.merged == true && inputs.transition_to != ''
    runs-on: ubuntu-latest
    steps:
      - name: Skip if bypass label present
        id: bypass
        env:
          PR_LABELS: ${{ inputs.pr_labels }}
          BYPASS_LABEL: ${{ inputs.bypass_label }}
        run: |
          python3 - <<'EOF'
          import json, os

          labels = json.loads(os.environ["PR_LABELS"])
          bypass = os.environ["BYPASS_LABEL"]
          skip = bypass in labels

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"skip={'true' if skip else 'false'}\n")
          EOF

      - name: Extract Jira key from PR title
        if: steps.bypass.outputs.skip != 'true'
        id: extract
        env:
          PR_TITLE: ${{ inputs.pr_title }}
          PROJECT_KEY: ${{ inputs.project_key }}
        run: |
          python3 - <<'EOF'
          import os, re

          pr_title = os.environ["PR_TITLE"]
          project_key = os.environ["PROJECT_KEY"].strip().upper()
          pattern = rf'\b{re.escape(project_key)}-\d+\b'

          match = re.search(pattern, pr_title, re.IGNORECASE)

          key = match.group(0).upper() if match else ''
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"key={key}\n")
          EOF

      - name: Transition ticket in Jira
        if: steps.bypass.outputs.skip != 'true' && steps.extract.outputs.key != ''
        env:
          JIRA_BASE_URL: ${{ inputs.jira_base_url }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ISSUE_KEY: ${{ steps.extract.outputs.key }}
          TRANSITION_TO: ${{ inputs.transition_to }}
        run: |
          python3 - <<'EOF'
          import base64, json, os, sys, urllib.request, urllib.error

          base_url = os.environ["JIRA_BASE_URL"].rstrip("/")
          email = os.environ["JIRA_EMAIL"]
          token = os.environ["JIRA_API_TOKEN"]
          issue_key = os.environ["ISSUE_KEY"]
          target_status = os.environ["TRANSITION_TO"].strip()

          auth = base64.b64encode(f"{email}:{token}".encode()).decode()
          headers = {"Authorization": f"Basic {auth}", "Accept": "application/json"}

          # Look up available transitions for this issue
          list_url = f"{base_url}/rest/api/3/issue/{issue_key}/transitions"
          req = urllib.request.Request(list_url, headers=headers)
          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  data = json.load(resp)
          except (urllib.error.HTTPError, urllib.error.URLError) as e:
              print(f"::warning::Could not fetch transitions for '{issue_key}': {e}. "
                    f"Card was not moved automatically — move it to '{target_status}' manually.")
              sys.exit(0)

          match = next(
              (t for t in data.get("transitions", [])
               if t["to"]["name"].strip().lower() == target_status.lower()),
              None,
          )

          if not match:
              available = ", ".join(t["to"]["name"] for t in data.get("transitions", []))
              print(f"::warning::No transition to '{target_status}' available for '{issue_key}' "
                    f"from its current status. Available transitions: {available}. "
                    f"Move the card manually.")
              sys.exit(0)

          transition_url = f"{base_url}/rest/api/3/issue/{issue_key}/transitions"
          body = json.dumps({"transition": {"id": match["id"]}}).encode()
          req = urllib.request.Request(
              transition_url,
              data=body,
              headers={**headers, "Content-Type": "application/json"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  resp.read()
          except (urllib.error.HTTPError, urllib.error.URLError) as e:
              print(f"::warning::Failed to transition '{issue_key}' to '{target_status}': {e}. "
                    f"Move the card manually.")
              sys.exit(0)

          print(f"✓ Moved {issue_key} to '{target_status}'.")
          EOF
